name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install API dependencies
        run: cd api && npm install

      - name: Run tests
        run: cd api && npm test

      - name: Install MCP server dependencies
        run: cd mcp-server && npm install

      - name: Publish MCP server
        run: |
          cd mcp-server
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @zensystemai/multi-agent-memory-mcp@$LOCAL_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$LOCAL_VERSION" ]; then
            echo "v$LOCAL_VERSION already published to npm — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
