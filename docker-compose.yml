version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: shared-brain-qdrant
    ports:
      - "6334:6333"
      - "6335:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  memory-api:
    build: ./api
    container_name: shared-brain-api
    ports:
      - "8084:8084"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for production structured storage
  # Enable with: docker-compose --profile postgres up
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: shared-brain-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shared_brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain_secret}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
