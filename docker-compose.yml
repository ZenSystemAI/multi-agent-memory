version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: shared-brain-qdrant
    ports:
      - "127.0.0.1:6334:6333"
      - "127.0.0.1:6335:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  memory-api:
    build: ./api
    container_name: shared-brain-api
    ports:
      - "127.0.0.1:8084:8084"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0  # Must be 0.0.0.0 inside container for Docker port mapping
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for production structured storage
  # Enable with: docker-compose --profile postgres up
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: shared-brain-postgres
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: shared_brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain_secret}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
